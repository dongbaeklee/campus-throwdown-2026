<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>릴스 티저 — 스크린 레코딩용</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,800;1,900&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}

/* 9:16 container centered */
.stage{
  width:405px;height:720px;
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#0a0a0a;overflow:hidden;
}

/* Noise overlay */
.noise{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:10}

/* Glow */
.glow-top{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,87,34,.25) 0%,transparent 65%)}
.glow-bot{position:absolute;bottom:-120px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,87,34,.12) 0%,transparent 65%)}

/* Scene system */
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none}
.scene.active{pointer-events:auto}

/* ── Scene 1: OPEN ── */
#s1 .line-h{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,87,34,.3);transform:scaleX(0);transform-origin:left;animation:none}
#s1 .big{font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:900;font-size:96px;color:#ff5722;text-transform:uppercase;letter-spacing:-.02em;line-height:.9;text-align:center;opacity:0}
#s1 .small{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;color:#666;letter-spacing:.15em;text-transform:uppercase;margin-top:16px;opacity:0}

/* ── Scene 2: TITLE ── */
#s2 .tag{font-size:11px;font-weight:700;letter-spacing:.2em;color:#ff5722;text-transform:uppercase;margin-bottom:12px;opacity:0;transform:translateY(10px)}
#s2 .title-kr{font-family:'Noto Sans KR',sans-serif;font-size:36px;font-weight:900;color:#fff;text-align:center;line-height:1.3;opacity:0;transform:translateY(20px)}
#s2 .title-en{font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:900;font-size:64px;color:#ff5722;text-transform:uppercase;letter-spacing:-.02em;line-height:.9;text-align:center;opacity:0;transform:translateY(20px)}

/* ── Scene 3: FACTS ── */
#s3 .fact-row{display:flex;gap:12px;margin:6px 0;opacity:0;transform:translateX(-30px)}
#s3 .fact-box{background:#111;border:1px solid #1e1e1e;border-left:3px solid #ff5722;padding:14px 18px;border-radius:2px;flex:1}
#s3 .fact-num{font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:900;font-size:34px;color:#ff5722;line-height:1}
#s3 .fact-label{font-size:11px;color:#888;margin-top:2px;font-weight:700}

/* ── Scene 4: CTA ── */
#s4 .cta-tag{font-size:11px;font-weight:700;letter-spacing:.2em;color:#ff5722;text-transform:uppercase;margin-bottom:16px;opacity:0}
#s4 .cta-main{font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:900;font-size:72px;color:#fff;text-transform:uppercase;letter-spacing:-.02em;line-height:.9;text-align:center;opacity:0;transform:scale(.9)}
#s4 .cta-date{font-size:14px;font-weight:700;color:#aaa;margin-top:20px;opacity:0;text-align:center;line-height:1.8}
#s4 .cta-btn{margin-top:28px;background:#ff5722;color:#fff;font-size:13px;font-weight:700;padding:14px 36px;border-radius:3px;letter-spacing:.1em;text-transform:uppercase;opacity:0;transform:translateY(12px)}
#s4 .cta-url{margin-top:12px;font-size:11px;color:#555;letter-spacing:.05em;opacity:0}

/* Counters */
.counter{position:absolute;bottom:24px;right:24px;z-index:20;display:flex;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:#333;transition:background .3s}
.dot.on{background:#ff5722}

/* Restart */
.restart-btn{position:absolute;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);z-index:30;background:rgba(255,87,34,.1);border:1px solid rgba(255,87,34,.3);color:#ff5722;font-size:12px;font-weight:700;padding:8px 20px;border-radius:2px;cursor:pointer;letter-spacing:.08em;opacity:0;transition:opacity .3s}
.restart-btn.show{opacity:1;transform:translateX(-50%) translateY(0);transition:opacity .3s, transform .4s}
</style>
</head>
<body>

<div class="stage">
  <div class="noise"></div>
  <div class="glow-top"></div>
  <div class="glow-bot"></div>

  <!-- Scene 1 -->
  <div class="scene" id="s1">
    <div class="line-h"></div>
    <div class="big">2026</div>
    <div class="small">전국 대학생 크로스핏 대회</div>
  </div>

  <!-- Scene 2 -->
  <div class="scene" id="s2">
    <div class="tag">Campus Throwdown 2026</div>
    <div class="title-kr">캠퍼스를<br>대표해서 뛰어</div>
    <div class="title-en">THROWDOWN</div>
  </div>

  <!-- Scene 3 -->
  <div class="scene" id="s3">
    <div class="fact-row">
      <div class="fact-box"><div class="fact-num">100</div><div class="fact-label">선착순 100명</div></div>
      <div class="fact-box"><div class="fact-num">5</div><div class="fact-label">참가 부문</div></div>
    </div>
    <div class="fact-row" style="transition-delay:.1s">
      <div class="fact-box"><div class="fact-num">OCT</div><div class="fact-label">10월 3일 & 9일</div></div>
      <div class="fact-box"><div class="fact-num">3만</div><div class="fact-label">개인 참가비</div></div>
    </div>
    <div class="fact-row" style="transition-delay:.2s">
      <div class="fact-box" style="flex:2;border-left-color:#fff"><div class="fact-num" style="font-size:20px;color:#fff">서울 올림픽공원 체조경기장</div><div class="fact-label">대회 장소</div></div>
    </div>
  </div>

  <!-- Scene 4 -->
  <div class="scene" id="s4" style="gap:0">
    <div class="cta-tag">신청 오픈</div>
    <div class="cta-main">지금<br>신청해</div>
    <div class="cta-date">
      마감 9월 19일 · 선착순 100명<br>
      <span style="color:#ff5722;font-weight:900">대회 D-Day: 10월 3일</span>
    </div>
    <div class="cta-btn">참가 신청하기 →</div>
    <div class="cta-url">campus-throwdown.netlify.app</div>
  </div>

  <div class="counter">
    <div class="dot on" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <button class="restart-btn" id="restartBtn" onclick="startAnim()">↺ 다시 보기</button>
</div>

<script>
const scenes=[document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
const dots=[document.getElementById('d0'),document.getElementById('d1'),document.getElementById('d2'),document.getElementById('d3')];
const restartBtn=document.getElementById('restartBtn');

function setDot(i){dots.forEach((d,idx)=>d.classList.toggle('on',idx===i))}

function fadeIn(el,delay=0,dur=400){
  return new Promise(r=>{
    setTimeout(()=>{
      el.style.transition=`opacity ${dur}ms ease, transform ${dur}ms ease`;
      el.style.opacity='1';
      el.style.transform='none';
      setTimeout(r,dur+50);
    },delay);
  });
}
function fadeOut(el,dur=300){
  return new Promise(r=>{
    el.style.transition=`opacity ${dur}ms ease`;
    el.style.opacity='0';
    setTimeout(r,dur+50);
  });
}

async function showScene(idx){
  scenes.forEach(s=>{s.style.opacity='0';s.style.display='flex'});
  setDot(idx);
  const s=scenes[idx];

  if(idx===0){
    const big=s.querySelector('.big');
    const small=s.querySelector('.small');
    const line=s.querySelector('.line-h');
    big.style.opacity='0';small.style.opacity='0';
    line.style.transform='scaleX(0)';
    await new Promise(r=>setTimeout(r,200));
    s.style.opacity='1';
    line.style.transition='transform 0.6s ease';
    line.style.transform='scaleX(1)';
    await fadeIn(big,300,500);
    await fadeIn(small,0,400);
    await new Promise(r=>setTimeout(r,1800));
  }

  if(idx===1){
    const tag=s.querySelector('.tag');
    const tkr=s.querySelector('.title-kr');
    const ten=s.querySelector('.title-en');
    tag.style.opacity='0';tkr.style.opacity='0';ten.style.opacity='0';
    tag.style.transform='translateY(10px)';tkr.style.transform='translateY(20px)';ten.style.transform='translateY(20px)';
    s.style.opacity='1';
    await fadeIn(tag,0,300);
    await fadeIn(tkr,100,500);
    await fadeIn(ten,200,500);
    await new Promise(r=>setTimeout(r,1800));
  }

  if(idx===2){
    const rows=s.querySelectorAll('.fact-row');
    rows.forEach(r=>{r.style.opacity='0';r.style.transform='translateX(-30px)'});
    s.style.opacity='1';
    for(let i=0;i<rows.length;i++){await fadeIn(rows[i],i*150,400);}
    await new Promise(r=>setTimeout(r,2000));
  }

  if(idx===3){
    const tag=s.querySelector('.cta-tag');
    const main=s.querySelector('.cta-main');
    const date=s.querySelector('.cta-date');
    const btn=s.querySelector('.cta-btn');
    const url=s.querySelector('.cta-url');
    [tag,main,date,btn,url].forEach(el=>{el.style.opacity='0'});
    main.style.transform='scale(0.9)';btn.style.transform='translateY(12px)';
    s.style.opacity='1';
    await fadeIn(tag,0,300);
    await fadeIn(main,150,500);
    await fadeIn(date,300,400);
    await fadeIn(btn,450,400);
    await fadeIn(url,550,400);
    await new Promise(r=>setTimeout(r,2500));
    restartBtn.classList.add('show');
  }
}

async function startAnim(){
  restartBtn.classList.remove('show');
  scenes.forEach(s=>s.style.display='none');
  for(let i=0;i<4;i++){
    scenes.forEach((s,j)=>s.style.display=j===i?'flex':'none');
    await showScene(i);
    if(i<3) await fadeOut(scenes[i]);
  }
}

window.onload=()=>startAnim();
</script>

</body>
</html>
